/* ── LAYOUT ── */#root{display:flex;flex-direction:column}.hdr{height:var(--hdr);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;z-index:200}.logo{font-size:16px;font-weight:800;color:var(--accent);letter-spacing:-.3px;display:flex;align-items:center;gap:7px;min-width:190px;white-space:nowrap}.logo svg{flex-shrink:0}.hdr-spacer{flex:1}.hdr-search{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1.5px solid transparent;border-radius:20px;padding:5px 12px;min-width:180px;max-width:280px;transition:.2s}.hdr-search:focus-within{border-color:var(--accent);background:var(--surface)}.hdr-search input{border:none;background:none;font-size:12px;color:var(--text1);outline:none;flex:1;min-width:0}.hdr-search input::placeholder{color:var(--text3)}.quick-bar{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1.5px solid transparent;border-radius:20px;padding:5px 12px;min-width:220px;max-width:320px;transition:.2s}.quick-bar:focus-within{border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 3px rgba(67,97,238,.1)}.quick-bar input{border:none;background:none;font-size:12px;color:var(--text1);outline:none;flex:1;min-width:0}.quick-bar input::placeholder{color:var(--text3)}.qhint{font-size:10px;color:var(--text3);background:var(--border);padding:1px 5px;border-radius:3px;white-space:nowrap}.icon-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:none;background:none;border-radius:var(--r-xs);color:var(--text2);transition:.15s;font-size:16px}.icon-btn:hover{background:var(--surface2);color:var(--text1)}
.body{flex:1;display:flex;overflow:hidden}.sidebar{width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}.detail{width:var(--detail);background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;transition:.25s}

.cat-item{display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:var(--r-xs);cursor:pointer;transition:.1s}.cat-item:hover{background:var(--surface2)}.cat-item.active{background:var(--accent-l)}.cat-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}.cat-name{font-size:12px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.cat-cnt{font-size:10px;color:var(--text3);background:var(--surface2);padding:1px 5px;border-radius:8px}.cat-del{width:16px;height:16px;border:none;background:none;color:var(--text3);font-size:12px;border-radius:3px;display:flex;align-items:center;justify-content:center;opacity:0;transition:.15s;flex-shrink:0}.cat-item:hover .cat-del{opacity:1}.cat-del:hover{background:var(--red-l);color:var(--red)}.add-cat-row{display:flex;gap:4px;margin-top:6px;align-items:center}.add-cat-input{flex:1;padding:5px 8px;border:1.5px solid var(--border);border-radius:var(--r-xs);font-size:11px;outline:none;background:var(--bg);color:var(--text1);min-width:0;transition:.15s}.add-cat-input:focus{border-color:var(--accent)}.add-cat-btn{padding:5px 8px;background:var(--accent);color:#fff;border:none;border-radius:var(--r-xs);font-size:11px;font-weight:600;white-space:nowrap}

idden;z-index:5;min-height:22px;display:flex;align-items:flex-start;gap:3px}.time-ev-block:hover{filter:brightness(.92);z-index:10}.current-time-line{position:absolute;left:0;right:0;height:2px;background:var(--red);z-index:15;pointer-events:none}.current-time-line::before{content:'';position:absolute;left:-4px;top:-4px;width:10px;height:10px;border-radius:50%;background:var(--red)}

/* ── DETAIL PANEL ── */.dp-hdr{padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}.dp-title{font-size:13px;font-weight:800}.dp-close{width:26px;height:26px;border:none;background:none;border-radius:5px;color:var(--text3);font-size:14px;display:flex;align-items:center;justify-content:center}.dp-close:hover{background:var(--surface2);color:var(--text1)}.dp-body{flex:1;overflow-y:auto;padding:14px 16px}.dp-evtitle{font-size:15px;font-weight:800;color:var(--text1);margin-bottom:14px;line-height:1.3}.dp-field{margin-bottom:12px}.dp-lbl{font-size:9px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}.dp-val{font-size:12px;color:var(--text1);font-weight:500}.status-row{display:flex;gap:4px}.st-btn{flex:1;padding:6px 3px;border:1.5px solid var(--border);border-radius:var(--r-xs);font-size:10px;font-weight:700;background:none;text-align:center;transition:.15s;color:var(--text2)}.st-btn.s-todo{border-color:var(--text3);color:var(--text3);background:var(--surface2)}.st-btn.s-prog{border-color:var(--amber);color:var(--amber);background:var(--amber-l)}.st-btn.s-done{border-color:var(--green);color:var(--green);background:var(--green-l)}.st-btn:not(.s-todo):not(.s-prog):not(.s-done):hover{border-color:var(--accent);color:var(--accent)}.pri-row{display:flex;gap:4px}.pri-btn{flex:1;padding:7px 2px;border:1.5px solid var(--border);border-radius:var(--r-xs);font-size:10px;font-weight:700;background:none;text-align:center;transition:.15s;color:var(--text2);display:flex;flex-direction:column;align-items:center;gap:2px}.pri-btn.p-high{border-color:var(--red);color:var(--red);background:var(--red-l)}.pri-btn.p-med{border-color:var(--amber);color:var(--amber);background:var(--amber-l)}.pri-btn.p-low{border-color:var(--green);color:var(--green);background:var(--green-l)}.pri-bars{display:flex;gap:1px;align-items:flex-end;height:12px}.pri-bars .b{width:3px;border-radius: /* ═══ UTILS ════════════════════════════════════════════════════════════════ */const dk=(y,m,d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const todayKey=()=>{const n=new Date();return dk(n.getFullYear(),n.getMonth(),n.getDate())};const parseD=s=>{const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)};const fmtDate=s=>{if(!s)return'';const d=parseD(s);return`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${DAYS_KR[d.getDay()]})`};const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);

/* ═══ ALARM SYSTEM ════════════════════════════════════════════════════════ */function useAlarms(events){  const [alarms,setAlarms]=useState([]);  const dismissed=useRef(new Set());  useEffect(()=>{    const check=()=>{      const now=new Date();      const todK=todayKey();      const nowTime=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;      events.forEach(ev=>{        if(ev.date===todK && ev.alarmTime && ev.alarmTime===nowTime){          const key=`${ev.id}-${ev.alarmTime}`;          if(!dismissed.current.has(key)){            dismissed.current.add(key);            setAlarms(p=>[...p,{id:uid(),ev,time:nowTime}]);          }        }      });    };    check();    const t=setInterval(check,30000);    return()=>clearInterval(t);  },[events]);  const dismiss=id=>setAlarms(p=>p.filter(a=>a.id!==id));  return{alarms,dismiss};}
/* ═══ TOAST ═══════════════════════════════════════════════════════════════ */function useToast(){  const [toasts,setToasts]=useState([]);  const show=(msg,type='default')=>{    const id=uid();    setToasts(p=>[...p,{id,msg,type}]);    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),2500);  };  return{toasts,show};}

/* ═══ MAIN APP ════════════════════════════════════════════════════════════ */function App(){  const [events,setEvents]=useState(()=>loadStore('mscal_ev',INIT_EVENTS));  const [cats,setCats]=useState(()=>loadStore('mscal_cats',DEFAULT_CATS));  const [isInitSync,setIsInitSync]=useState(false);  const [view,setView]=useState('month');  const [cur,setCur]=useState(()=>{const n=new Date();return{y:n.getFullYear(),m:n.getMonth()}});  const [selDate,setSelDate]=useState(todayKey());  const [selEv,setSelEv]=useState(null);  const [modal,setModal]=useState(null); // null | {date,event?}  const [filterCat,setFilterCat]=useState('all');  const [filterPri,setFilterPri]=useState('all');  const [search,setSearch]=useState('');  const [quickAdd,setQuickAdd]=useState('');  const [dragEv,setDragEv]=useState(null);  const [morePopup,setMorePopup]=useState(null); // {date,pos}  const {toasts,show:toast}=useToast();  const {alarms,dismiss:dismissAlarm}=useAlarms(events);  const TODAY=todayKey();

  /* DB Save & Local Sync */  useEffect(()=>{    if(!isInitSync) return;    saveStore('mscal_ev',events);    saveStore('mscal_cats',cats);    fetch(DB_URL, {      method: 'POST',      headers: { 'Content-Type': 'text/plain' },      body: JSON.stringify({events, cats})    }).catch(e=>console.error('Data save error:',e));  },[events,cats,isInitSync]);
  /* expand repeating events */  const expandedEvents=useMemo(()=>{    const base=[];    events.forEach(ev=>{      base.push(ev);      if(!ev.repeat||ev.repeat==='none') return;      const orig=parseD(ev.date);      for(let i=1;i<=90;i++){        const d=new Date(orig);        if(ev.repeat==='daily') d.setDate(orig.getDate()+i);        else if(ev.repeat==='weekly') d.setDate(orig.getDate()+i*7);        else if(ev.repeat==='monthly') d.setMonth(orig.getMonth()+i);        else break;        const key=dk(d.getFullYear(),d.getMonth(),d.getDate());        base.push({...ev,id:ev.id+'-r'+i,date:key,_repeat:true});      }    });    return base;  },[events]);
  const filtered=useMemo(()=>expandedEvents.filter(e=>{    if(filterCat!=='all'&&e.category!==filterCat) return false;    if(filterPri!=='all'&&e.priority!==filterPri) return false;    if(search&&!e.title.toLowerCase().includes(search.toLowerCase())) return false;    return true;  }),[expandedEvents,filterCat,filterPri,search]);
  const byDate=useMemo(()=>{    const m={};    filtered.forEach(e=>{if(!m[e.date])m[e.date]=[];m[e.date].push(e)});    return m;  },[filtered]);

  function handleQuickAdd(e){    if(e.key==='Enter'&&quickAdd.trim()){      const ev={id:uid(),date:selDate||TODAY,title:quickAdd.trim(),status:'todo',priority:'medium',category:cats[0]?.id||'admin',color:cats[0]?.color||'#4361ee',memo:'',repeat:'none',alarmTime:'',startTime:'',endTime:''};      setEvents(p=>[...p,ev]);setQuickAdd('');toast('✅ 일정 추가됨','suc');    }  }  function handleSave(ev){    if(modal?.event) setEvents(p=>p.map(e=>e.id===ev.id?ev:e));    else setEvents(p=>[...p,{...ev,id:uid()}]);    setModal(null);toast(modal?.event?'✏️ 수정 완료':'✅ 일정 추가됨','suc');  }  function handleDelete(id){setEvents(p=>p.filter(e=>e.id!==id));setSelEv(null);toast('🗑️ 삭제됨')}  function handleToggle(id){setEvents(p=>p.map(e=>e.id===id?{...e,status:e.status==='done'?'todo':'done'}:e))}  function handleStatus(id,s){setEvents(p=>p.map(e=>e.id===id?{...e,status:s}:e))}  function handleDrop(date){if(!dragEv||dragEv._repeat) return;setEvents(p=>p.map(e=>e.id===dragEv.id?{...e,date}:e));toast(`📅 이동됨`);setDragEv(null)}

  return <>    {/* HEADER */}    <header className="hdr">      <div className="logo">        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">          <rect x="1" y="3" width="16" height="14" rx="2.5" fill="#4361ee" opacity=".15"/>          <rect x="1" y="3" width="16" height="14" rx="2.5" stroke="#4361ee" strokeWidth="1.5"/>          <rect x="5" y="1" width="2" height="4" rx="1" fill="#4361ee"/>          <rect x="11" y="1" width="2" height="4" rx="1" fill="#4361ee"/>          <rect x="3" y="9" width="3" height="3" rx=".7" fill="#4361ee" opacity=".7"/>          <rect x="7.5" y="9" width="3" height="3" rx=".7" fill="#4361ee" opacity=".7"/>          <rect x="12" y="9" width="3" height="3" rx=".7" fill="#4361ee" opacity=".7"/>        </svg>        MS Calendar      </div>      <div style={{display:'flex',gap:3}}>        {['month','week','day'].map(v=><button key={v} className={`view-btn ${view===v?'active':''}`} style={{padding:'4px 10px',border:'none',background:view===v?'var(--accent-l)':'none',borderRadius:'var(--r-xs)',fontSize:11,fontWeight:view===v?700:500,color:view===v?'var(--accent)':'var(--text2)',transition:'.15s'}} onClick={()=>setView(v)}>          {v==='month'?'월간':v==='week'?'주간':'일간'}        </button>)}      </div>      <div className="hdr-spacer"/>      <div className="hdr-search">        <span style={{fontSize:13,color:'var(--text3)'}}>🔍</span>        <input placeholder="검색..." value={search} onChange={e=>setSearch(e.target.value)}/>      </div>      <div className="quick-bar">        <span style={{fontSize:13,color:'var(--accent)'}}>+</span>        <input placeholder="빠른 추가 (Enter)" value={quickAdd} onChange={e=>setQuickAdd(e.target.value)} onKeyDown={handleQuickAdd}/>        <span className="qhint">Enter ↵</span>      </div>    </header>

ndleToggle} onEdit={ev=>setModal({date:ev.date,event:ev})} onDelete={handleDelete}            onAdd={()=>setModal({date:selDate})}/>}        </div>      </main>

/* ═══ TODAY WIDGET ════════════════════════════════════════════════════════ */function TodayWidget({today,events,onToggle}){  const n=new Date();  const ds=`${n.getMonth()+1}월 ${n.getDate()}일 ${DAYS_KR[n.getDay()]}요일`;  const done=events.filter(e=>e.status==='done').length;  return <div className="today-widget">    <div className="tw-date">{ds}</div>    <div className="tw-count">{done}<span style={{fontSize:14,opacity:.7}}>/{events.length}</span></div>    <div className="tw-sub">오늘 일정 완료</div>    {events.length>0&&<div className="tw-tasks">      {events.slice(0,4).map(e=><div key={e.id} className={`tw-task ${e.status==='done'?'done':''}`} onClick={()=>onToggle(e.id)}>        <div className="tw-dot" style={{background:e.status==='done'?'rgba(255,255,255,.9)':'rgba(255,255,255,.4)'}}/>        {e.title}      </div>)}      {events.length>4&&<div style={{fontSize:10,opacity:.55,marginTop:1}}>+{events.length-4}개 더</div>}    </div>}  </div>;}
/* ═══ MINI CALENDAR ═══════════════════════════════════════════════════════ */function MiniCal({cur,byDate,sel,today,onSel,onPrev,onNext}){  const {y,m}=cur;  const fd=new Date(y,m,1).getDay();  const dim=new Date(y,m+1,0).getDate();  const pd=new Date(y,m,0).getDate();  const cells=[];  for(let i=fd-1;i>=0;i--) cells.push({d:pd-i,cur:false});  for(let d=1;d<=dim;d++) cells.push({d,cur:true});  while(cells.length<42) cells.push({d:cells.length-dim-fd+1,cur:false});  return <div>    <div className="mini-cal-hdr">      <span className="mini-cal-title">{y}년 {m+1}월</span>      <div className="mini-nav"><button onClick={onPrev}>‹</button><button onClick={onNext}>›</button></div>    </div>    <div className="mini-grid">      {DAYS_KR.map(d=><div key={d} className="mini-dlbl">{d}</div>)}      {cells.map((c,i)=>{        const k=c.cur?dk(y,m,c.d):'';        const dow=i%7;        const isHol=k&&KR_HOLIDAYS[k];        return <div key={i} className={`mini-d ${!c.cur?'other':''} ${k===today&&c.cur?'today':''} ${k===sel&&c.cur?'sel':''} ${c.cur&&byDate[k]?.length>0?'has-ev':''} ${isHol?'holiday':''} ${(dow===0)&&c.cur&&!isHol?'holiday':''}`}          onClick={()=>c.cur&&onSel(k)}>{c.d}</div>;      })}    </div>  </div>;}
/* ═══ ADD CATEGORY ROW ════════════════════════════════════════════════════ */function AddCatRow({onAdd}){  const [name,setName]=useState('');  const [color,setColor]=useState(CAT_COLORS[0]);  const [open,setOpen]=useState(false);  return <div style={{marginTop:4}}>    {!open&&<button style={{width:'100%',padding:'5px 7px',border:'1.5px dashed var(--border)',borderRadius:'var(--r-xs)',background:'none',color:'var(--text3)',fontSize:11,fontWeight:600,cursor:'pointer',transition:'.15s'}} onClick={()=>setOpen(true)}>+ 카테고리 추가</button>}    {open&&<div style={{display:'flex',flexDirection:'column',gap:4,padding:'6px',background:'var(--surface2)',borderRadius:'var(--r-xs)'}}>      <input className="add-cat-input" placeholder="카테고리 이름" value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'){onAdd(name,color);setName('');setOpen(false)}}}/>      <div style={{display:'flex',gap:3,flexWrap:'wrap'}}>        {CAT_COLORS.map(c=><div key={c} style={{width:18,height:18,borderRadius:4,background:c,cursor:'pointer',border:`2px solid ${c===color?'var(--text1)':'transparent'}`,transition:'.1s'}} onClick={()=>setColor(c)}/>)}      </div>      <div style={{display:'flex',gap:3}}>        <button className="add-cat-btn" style={{flex:1}} onClick={()=>{onAdd(name,color);setName('');setOpen(false)}}>추가</button>        <button className="add-cat-btn" style={{background:'var(--surface2)',color:'var(--text2)',border:'1px solid var(--border)'}} onClick={()=>setOpen(false)}>취소</button>      </div>    </div>}  </div>;}
/* ═══ MONTH VIEW ══════════════════════════════════════════════════════════ */function MonthView({year,month,byDate,today,cats,onDateClick,onEvClick,onDrop,dragEv,setDragEv,morePopup,setMorePopup}){  const fd=new Date(year,month,1).getDay();  const dim=new Date(year,month+1,0).getDate();  const pd=new Date(year,month,0).getDate();  const cells=[];  for(let i=fd-1;i>=0;i--) cells.push({d:pd-i,cur:false});  for(let d=1;d<=dim;d++) cells.push({d,cur:true});  while(cells.length%7!==0||cells.length<35) cells.push({d:cells.length-dim-fd+1,cur:false});  const [dragOver,setDragOver]=useState(null);
  return <div className="month-grid">    {DAYS_KR.map((d,i)=><div key={d} className={`dh ${i===0?'we':''}`}>{d}</div>)}    {cells.map((c,i)=>{      const k=c.cur?dk(year,month,c.d):'';      const dow=i%7;      const evs=k?byDate[k]||[]:[];      const isHol=k&&KR_HOLIDAYS[k];      const isSun=dow===0;      return <div key={i}        className={`day-cell ${!c.cur?'other-m':''} ${k===today&&c.cur?'is-today':''} ${dragOver===k?'drag-over':''} ${isHol&&c.cur?'holiday-cell':''}`}        onClick={()=>c.cur&&onDateClick(k)}        onDragOver={e=>{e.preventDefault();setDragOver(k)}}        onDragLeave={()=>setDragOver(null)}        onDrop={e=>{e.preventDefault();onDrop(k);setDragOver(null)}}>        {isHol&&c.cur&&<div className="holiday-label">{KR_HOLIDAYS[k]}</div>}        <div className={`dn ${k===today&&c.cur?'today':''} ${!c.cur?'other-m':''} ${(isSun||isHol)&&!(!c.cur)&&k!==today?'holiday-num':''}`}>{c.d}</div>        <MonthEvList evs={evs} cats={cats} date={k} onEvClick={onEvClick} setDragEv={setDragEv} setMorePopup={setMorePopup}/>      </div>;    })}  </div>;}
function MonthEvList({evs,cats,date,onEvClick,setDragEv,setMorePopup}){  const LIMIT=6;  const vis=evs.slice(0,LIMIT);  const more=evs.length-LIMIT;  return <>    {vis.map(ev=>{      const cat=cats.find(c=>c.id===ev.category);      const clr=cat?.color||'#4361ee';      return <div key={ev.id}        className={`ev-chip ${ev.status==='done'?'done':''}`}        style={{background:clr+'1e',color:clr,borderLeftColor:clr}}        onClick={e=>{e.stopPropagation();onEvClick(ev)}}        draggable={!ev._repeat}        onDragStart={()=>setDragEv(ev)}        onDragEnd={()=>setDragEv(null)}        title={ev.title}>        {ev.status==='done'&&<span className="ck">✓</span>}        {ev.status==='progress'&&<span className="ck" style={{color:clr}}>▶</span>}        <span className="et">{ev.title}</span>        {ev.startTime&&<span className="time-tag">{ev.startTime}</span>}        <PriBars p={ev.priority} size={2}/>      </div>;    })}    {more>0&&<div className="more-btn" onClick={e=>{e.stopPropagation();setMorePopup({date,pos:{x:e.clientX,y:e.clientY}})}}>+{more}개 더 보기</div>}  </>;}
/* ═══ WEEK VIEW ═══════════════════════════════════════════════════════════ */function WeekView({year,month,selDate,byDate,today,cats,onDateClick,onEvClick}){  const sd=selDate?parseD(selDate):new Date(year,month,1);  const dow=sd.getDay();  const ws=new Date(sd);ws.setDate(sd.getDate()-dow);  const days=Array.from({length:7},(_,i)=>{const d=new Date(ws);d.setDate(ws.getDate()+i);const k=dk(d.getFullYear(),d.getMonth(),d.getDate());return{d,k,isToday:k===today,isHol:KR_HOLIDAYS[k],isSun:i===0}});  const hours=Array.from({length:24},(_,i)=>i);  const nowRef=useRef(null);  useEffect(()=>{if(nowRef.current)nowRef.current.scrollIntoView({block:'center'})},[]);  const nowPct=()=>{const n=new Date();return(n.getHours()*60+n.getMinutes())/1440*100};
  return <div className="week-wrap">    <div className="week-header-grid">      <div className="week-corner"/>      {days.map(d=><div key={d.k} className="week-dh" onClick={()=>onDateClick(d.k)}>        <div className="week-dn-name">{DAYS_KR[d.d.getDay()]}요일</div>        <div className={`week-dn-num ${d.isToday?'today':''} ${(d.isHol||d.isSun)&&!d.isToday?'holiday':''}`}>{d.d.getDate()}</div>        {d.isHol&&<div style={{fontSize:9,color:'var(--red)',fontWeight:700,textAlign:'center',lineHeight:1.1}}>{d.isHol}</div>}      </div>)}    </div>    {/* ALL-DAY: show ALL events */}    <div className="week-allday-grid">      <div className="week-allday-lbl">종일</div>      {days.map(d=>{        const evs=byDate[d.k]||[];        return <div key={d.k} className="week-allday-cell" onClick={()=>onDateClick(d.k)}>          {evs.map(ev=>{const cat=cats.find(c=>c.id===ev.category);const clr=cat?.color||'#4361ee';return(            <div key={ev.id} className={`ev-chip ${ev.status==='done'?'done':''}`}              style={{background:clr+'1e',color:clr,borderLeftColor:clr,marginBottom:2}}              onClick={e=>{e.stopPropagation();onEvClick(ev)}}>              {ev.status==='done'&&<span className="ck">✓</span>}              {ev.status==='progress'&&<span className="ck">▶</span>}              <span className="et">{ev.title}</span>              {ev.startTime&&<span className="time-tag">{ev.startTime}</span>}              <PriBars p={ev.priority} size={2}/>            </div>          );})}        </div>;      })}    </div>    {/* TIME GRID */}    <div className="week-body-grid" style={{position:'relative'}}>      {days.map((d,di)=>{        if(!d.isToday) return null;        return <div key={d.k} style={{position:'absolute',top:`${nowPct()}%`,left:`calc(52px + ${di}/7 * (100% - 52px))`,width:`calc((100% - 52px)/7)`,height:2,background:'var(--red)',zIndex:15,pointerEvents:'none'}}>          <div style={{position:'absolute',left:-4,top:-4,width:10,height:10,borderRadius:'50%',background:'var(--red)'}}/></div>;      })}      {hours.map(h=><React.Fragment key={h}>        <div className="week-time-lbl" ref={h===new Date().getHours()?nowRef:null}>{h===0?'':`${h}:00`}</div>        {days.map(d=>{          const slotEvs=(byDate[d.k]||[]).filter(ev=>ev.startTime&&parseInt(ev.startTime.split(':')[0])===h);          return <div key={d.k} className={`week-slot ${d.isToday?'today-col':''} ${(d.isHol||d.isSun)?'holiday-col':''}`}            onClick={()=>onDateClick(d.k)}>            {slotEvs.map(ev=>{const cat=cats.find(c=>c.id===ev.category);const clr=cat?.color||'#4361ee';const mins=parseInt(ev.startTime.split(':')[1]||0);return(              <div key={ev.id} className="time-ev-block"                style={{background:clr+'22',color:clr,borderLeft:`3px solid ${clr}`,top:`${(mins/60)*48}px`}}                onClick={e=>{e.stopPropagation();onEvClick(ev)}}>                <PriBars p={ev.priority} size={2}/>                <span style={{fontSize:10,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ev.startTime} {ev.title}</span>              </div>            );})}          </div>;        })}      </React.Fragment>)}    </div>  </div>;}
/* ═══ DAY VIEW ════════════════════════════════════════════════════════════ */function DayView({date,events,today,cats,onToggle,onEdit,onDelete,onAdd}){  const isT=date===today;  const done=events.filter(e=>e.status==='done').length;  const prog=events.filter(e=>e.status==='progress').length;  const sorted=[...events].sort((a,b)=>{if(!a.startTime&&!b.startTime)return 0;if(!a.startTime)return 1;if(!b.startTime)return -1;return a.startTime.localeCompare(b.startTime)});  return <div className="day-view">    <div className="dv-hdr">      <div>        <div className="dv-date">{fmtDate(date)}</div>        <div className="dv-sub">          <span style={{color:'var(--text2)'}}>총 {events.length}개</span>          {done>0&&<span style={{color:'var(--green)',fontWeight:700}}>완료 {done}</span>}          {prog>0&&<span style={{color:'var(--amber)',fontWeight:700}}>진행중 {prog}</span>}          {KR_HOLIDAYS[date]&&<span style={{color:'var(--red)',fontWeight:700}}>🎌 {KR_HOLIDAYS[date]}</span>}        </div>      </div>      <button className="btn-p" style={{padding:'7px 14px',fontSize:11,flexShrink:0}} onClick={onAdd}>+ 일정 추가</button>    </div>    {events.length===0?<div className="empty"><div className="ei">📅</div><div className="et2">이 날 일정이 없습니다</div><div className="es">위 버튼으로 추가해보세요</div></div>:    <div className="dv-tasks">{sorted.map(ev=>{      const cat=cats.find(c=>c.id===ev.category);      const clr=cat?.color||'#4361ee';      const stBg=ev.status==='todo'?'var(--surface2)':ev.status==='progress'?'var(--amber-l)':'var(--green-l)';      const stClr=ev.status==='todo'?'var(--text3)':ev.status==='progress'?'var(--amber)':'var(--green)';      return <div key={ev.id} className="dv-card" style={{borderLeftColor:clr}} onClick={()=>onEdit(ev)}>        <div className={`dv-check ${ev.status==='done'?'done':''}`}          style={{borderColor:ev.status!=='done'?clr:'',background:ev.status==='progress'?'var(--amber-l)':''}}          onClick={e=>{e.stopPropagation();onToggle(ev.id)}}>          {ev.status==='done'&&'✓'}          {ev.status==='progress'&&<span style={{fontSize:9,color:'var(--amber)'}}>▶</span>}        </div>        <div className="dv-info">          <div className={`dv-name ${ev.status==='done'?'done':''}`}>{ev.title}</div>          <div className="dv-meta">            <span className={`badge b-${ev.priority==='high'?'high':ev.priority==='medium'?'med':'low'}`}>              {ev.priority==='high'?'높음':ev.priority==='medium'?'보통':'낮음'}            </span>            <span className="badge" style={{background:clr+'22',color:clr}}>{cat?.name||ev.category}</span>            <span className="badge" style={{background:stBg,color:stClr,border:ev.status==='progress'?`1px dashed ${stClr}`:'none'}}>              {ev.status==='todo'?'시작전':ev.status==='progress'?'진행중':'완료'}            </span>            {ev.startTime&&<span className="badge b-time">⏰ {ev.startTime}{ev.endTime?` ~ ${ev.endTime}`:''}</span>}            {ev.alarmTime&&<span className="badge" style={{background:'var(--red-l)',color:'var(--red)'}}>🔔 {ev.alarmTime}</span>}            {ev.repeat&&ev.repeat!=='none'&&<span className="badge" style={{background:'var(--purple-l)',color:'var(--purple)'}}>🔁 {ev.repeat==='daily'?'매일':ev.repeat==='weekly'?'매주':'매월'}</span>}          </div>        </div>        <PriBars p={ev.priority}/>        <button className="btn-d" style={{padding:'5px 8px',fontSize:11}} onClick={e=>{e.stopPropagation();onDelete(ev.id)}}>삭제</button>      </div>;    })}</div>}  </div>;}
/* ═══ DETAIL PANEL ════════════════════════════════════════════════════════ */function DetailPanel({ev,cats,onClose,onEdit,onDelete,onToggle,onStatus}){  if(!ev) return <div className="detail" style={{display:'flex',alignItems:'center',justifyContent:'center'}}>    <div className="empty"><div className="ei">👆</div><div className="et2">일정을 선택하세요</div><div className="es">캘린더에서 클릭</div></div>  </div>;  const cat=cats.find(c=>c.id===ev.category);  const clr=cat?.color||'#4361ee';  return <div className="detail" style={{display:'flex',flexDirection:'column'}}>    <div className="dp-hdr">      <div className="dp-title">일정 상세</div>      <button className="dp-close" onClick={onClose}>✕</button>    </div>    <div className="dp-body">      <div style={{display:'flex',alignItems:'flex-start',gap:7,marginBottom:12}}>        <div style={{width:11,height:11,borderRadius:3,background:clr,flexShrink:0,marginTop:3}}/>        <div className="dp-evtitle">{ev.title}</div>      </div>      <div className="dp-field"><div className="dp-lbl">날짜</div><div className="dp-val">{fmtDate(ev.date)}</div></div>      {ev.startTime&&<div className="dp-field"><div className="dp-lbl">시간</div><div className="dp-val">⏰ {ev.startTime}{ev.endTime?` ~ ${ev.endTime}`:''}</div></div>}      {ev.alarmTime&&<div className="dp-field"><div className="dp-lbl">알림</div><div className="dp-val" style={{color:'var(--red)'}}>🔔 {ev.alarmTime}</div></div>}      {ev.repeat&&ev.repeat!=='none'&&<div className="dp-field"><div className="dp-lbl">반복</div><div className="dp-val" style={{color:'var(--purple)'}}>🔁 {ev.repeat==='daily'?'매일':ev.repeat==='weekly'?'매주':'매월'}</div></div>}      <div className="dp-field">        <div className="dp-lbl">상태</div>        <div className="status-row">          {[['todo','시작전','s-todo'],['progress','진행중','s-prog'],['done','완료','s-done']].map(([s,l,ac])=>(            <button key={s} className={`st-btn ${ev.status===s?ac:''}`} onClick={()=>onStatus(ev.id,s)}>{l}</button>          ))}        </div>      </div>      <div className="dp-field">        <div className="dp-lbl">우선순위</div>        <div className="pri-row">          {[['high','🔴 높음','p-high'],['medium','🟡 보통','p-med'],['low','🟢 낮음','p-low']].map(([p,l,ac])=>(            <button key={p} className={`pri-btn ${ev.priority===p?ac:''}`}>              <PriBars p={p}/>{l.split(' ')[1]}            </button>          ))}        </div>      </div>      <div className="dp-field">        <div className="dp-lbl">카테고리</div>        <span className="badge" style={{background:clr+'22',color:clr,fontSize:11,padding:'3px 9px',borderRadius:100}}>{cat?.name||ev.category}</span>      </div>      {ev.memo&&<div className="dp-field"><div className="dp-lbl">메모</div><div style={{fontSize:12,color:'var(--text2)',background:'var(--surface2)',padding:'8px 10px',borderRadius:'var(--r-xs)',lineHeight:1.5}}>{ev.memo}</div></div>}    </div>    <div className="dp-actions">      <button className="btn-p" onClick={()=>onEdit(ev)}>수정</button>      <button className="btn-s" onClick={()=>onToggle(ev.id)}>{ev.status==='done'?'미완료':'완료'}</button>      <button className="btn-d" onClick={()=>onDelete(ev.id)}>삭제</button>    </div>  </div>;}
/* ═══ EVENT MODAL ═════════════════════════════════════════════════════════ */function EventModal({date,event,cats,onSave,onClose}){  const [f,setF]=useState({    id:event?.id||'',date:event?.date||date||todayKey(),title:event?.title||'',    status:event?.status||'todo',priority:event?.priority||'medium',    category:event?.category||cats[0]?.id||'admin',    color:event?.color||cats[0]?.color||'#4361ee',    memo:event?.memo||'',repeat:event?.repeat||'none',    alarmTime:event?.alarmTime||'',    startTime:event?.startTime||'',endTime:event?.endTime||'',  });  const u=(k,v)=>setF(p=>({...p,[k]:v}));  const submit=()=>{if(!f.title.trim())return;onSave({...f,title:f.title.trim()})};
  const statusMap={todo:['sel-btn sel-todo','시작전'],progress:['sel-btn sel-prog','진행중'],done:['sel-btn sel-done','완료']};  const priMap={high:['sel-btn sel-high','🔴 높음'],medium:['sel-btn sel-med','🟡 보통'],low:['sel-btn sel-low','🟢 낮음']};
  return <div className="mo" onClick={onClose}>    <div className="mo-box" onClick={e=>e.stopPropagation()}>      <div className="mo-hdr">        <div className="mo-title">{event?'일정 수정':'새 일정 추가'}</div>        <button className="dp-close" onClick={onClose}>✕</button>      </div>      <div className="mo-body">        <div className="f-row">          <label className="f-lbl">일정 제목 *</label>          <input className="f-inp" placeholder="일정 제목 입력..." value={f.title} onChange={e=>u('title',e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} autoFocus/>        </div>        <div className="f-grid2 f-row">          <div><label className="f-lbl">날짜</label><input type="date" className="f-inp" value={f.date} onChange={e=>u('date',e.target.value)}/></div>          <div><label className="f-lbl">카테고리</label>            <select className="f-inp" value={f.category} onChange={e=>{const c=cats.find(x=>x.id===e.target.value);u('category',e.target.value);if(c)u('color',c.color)}}>              {cats.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}            </select>          </div>        </div>        {/* 시간대 */}        <div className="f-row">          <label className="f-lbl">⏰ 시작 / 종료 시간 <span style={{fontSize:9,fontWeight:400,opacity:.7}}>(선택)</span></label>          <div className="f-grid2">            <input type="time" className="f-inp" value={f.startTime} onChange={e=>u('startTime',e.target.value)} placeholder="시작"/>            <input type="time" className="f-inp" value={f.endTime} onChange={e=>u('endTime',e.target.value)} placeholder="종료"/>          </div>        </div>        {/* 알림 */}        <div className="f-row">          <label className="f-lbl">🔔 알림 시간 <span style={{fontSize:9,fontWeight:400,opacity:.7}}>(해당 시간에 팝업 알림)</span></label>          <input type="time" className="f-inp" value={f.alarmTime} onChange={e=>u('alarmTime',e.target.value)}/>        </div>        {/* 상태 */}        <div className="f-row">          <label className="f-lbl">상태</label>          <div className="f-grid3">            {Object.entries(statusMap).map(([s,[cls,lbl]])=>(              <button key={s} className={`${cls} ${f.status===s?cls.split(' ')[1]:''}`} style={{opacity:f.status===s?1:.55}} onClick={()=>u('status',s)}>{lbl}</button>            ))}          </div>        </div>        {/* 우선순위 */}        <div className="f-row">          <label className="f-lbl">우선순위</label>          <div className="f-grid3">            {Object.entries(priMap).map(([p,[cls,lbl]])=>(              <button key={p} className={`${cls} ${f.priority===p?cls.split(' ')[1]:''}`} style={{opacity:f.priority===p?1:.55}} onClick={()=>u('priority',p)}>{lbl}</button>            ))}          </div>        </div>        {/* 반복 */}        <div className="f-row">          <label className="f-lbl">🔁 반복 설정</label>          <div className="repeat-opts">            {[['none','없음'],['daily','매일'],['weekly','매주'],['monthly','매월']].map(([r,l])=>(              <button key={r} className={`rep-btn ${f.repeat===r?'active':''}`} onClick={()=>u('repeat',r)}>{l}</button>            ))}          </div>        </div>        {/* 색상 */}        <div className="f-row">          <label className="f-lbl">색상 태그</label>          <div className="color-pick">{CHIP_COLORS.map(c=><div key={c} className={`csw ${f.color===c?'sel':''}`} style={{background:c}} onClick={()=>u('color',c)}/>)}</div>        </div>        {/* 메모 */}        <div className="f-row">          <label className="f-lbl">메모</label>          <textarea className="f-inp" rows={2} placeholder="메모..." value={f.memo} onChange={e=>u('memo',e.target.value)}/>        </div>      </div>      <div className="mo-footer">        <button className="btn-s" onClick={onClose}>취소</button>        <button className="btn-p" style={{padding:'9px 22px'}} onClick={submit}>{event?'수정 완료':'추가'}</button>      </div>    </div>  </div>;}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);</script></body></html>
